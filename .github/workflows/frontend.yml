name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'src/Frontend/urbanx-react/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'src/Frontend/urbanx-react/**'
      - '.github/workflows/frontend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontend/urbanx-react
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Frontend/urbanx-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit + component tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api
          VITE_BFF_BASE_URL: /bff
          VITE_OIDC_CLIENT_ID: urbanx-spa
          VITE_OIDC_SCOPES: 'openid profile email catalog.read orders.read orders.write'
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Bundle-size budget
        run: npm run size

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/Frontend/urbanx-react/dist
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: src/Frontend/urbanx-react
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Frontend/urbanx-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('src/Frontend/urbanx-react/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/Frontend/urbanx-react/playwright-report
          retention-days: 14
