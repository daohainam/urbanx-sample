name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'
  
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Install .NET Aspire workload
      run: dotnet workload install aspire
      
    - name: Restore dependencies
      run: dotnet restore UrbanX.sln
      
    - name: Build solution
      run: dotnet build UrbanX.sln --configuration Release --no-restore
      
    - name: Run unit tests
      run: dotnet test UrbanX.sln --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName~UnitTests" --logger "trx;LogFileName=test-results.trx"
      
    - name: Run integration tests
      run: dotnet test UrbanX.sln --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName~IntegrationTests" --logger "trx;LogFileName=integration-test-results.trx"
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/test-results*.trx'
        
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: csharp
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Install .NET Aspire workload
      run: dotnet workload install aspire
      
    - name: Build for analysis
      run: dotnet build UrbanX.sln --configuration Release
      
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      
    - name: Dependency vulnerability scan
      run: dotnet list package --vulnerable --include-transitive
      
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push'
    
    strategy:
      matrix:
        service: 
          - { name: 'catalog', path: 'src/Services/Catalog/Dockerfile' }
          - { name: 'order', path: 'src/Services/Order/Dockerfile' }
          - { name: 'payment', path: 'src/Services/Payment/Dockerfile' }
          - { name: 'merchant', path: 'src/Services/Merchant/Dockerfile' }
          - { name: 'identity', path: 'src/Services/Identity/Dockerfile' }
          - { name: 'gateway', path: 'src/Gateway/Dockerfile' }
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/urbanx-${{ matrix.service.name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ matrix.service.path }}
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Run Trivy security scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ github.repository }}/urbanx-${{ matrix.service.name }}:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results.sarif'
      if: github.ref == 'refs/heads/main'
        
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
      if: github.ref == 'refs/heads/main'
